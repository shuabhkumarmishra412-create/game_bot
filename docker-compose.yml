version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: game_bot_db
    environment:
      MONGO_INITDB_DATABASE: game_bot
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/game_bot --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Game Bot Application
  game_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game_bot_app
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      MONGODB_URI: mongodb://mongodb:27017/game_bot
      MINI_APP_URL: http://localhost:3000
      BOT_SERVER_PORT: 3001
      MINI_APP_PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

volumes:
  mongodb_data:
    driver: local
